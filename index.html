<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Vybing</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --purple: #7B2FFF;
    --purple-light: #A96EFF;
    --purple-soft: #C8A8FF;
    --dark: #0a0a0f;
    --nav-bg: #1a0a3a;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--dark);
    font-family: 'Nunito', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  .phone {
    width: 390px;
    height: 844px;
    border-radius: 50px;
    border: 3px solid #3a1a6a;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 80px rgba(123,47,255,0.35), 0 40px 80px rgba(0,0,0,0.8);
    background: #0d0d18;
  }

  .notch {
    position: absolute; top: 0; left: 50%;
    transform: translateX(-50%);
    width: 120px; height: 32px;
    background: #0a0a0f;
    border-radius: 0 0 22px 22px;
    z-index: 200;
  }

  #map {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    z-index: 1;
  }

  /* ── SEARCH BAR ── */
  .search-bar {
    position: absolute;
    top: 48px; left: 16px; right: 16px;
    z-index: 50;
    display: flex; align-items: center; gap: 10px;
  }
  .search-wrapper { flex: 1; position: relative; }
  .search-icon {
    position: absolute; left: 14px; top: 50%;
    transform: translateY(-50%);
    font-size: 15px; pointer-events: none;
  }
  .search-input {
    width: 100%;
    background: rgba(20,10,45,0.88);
    border: 1.5px solid rgba(200,168,255,0.4);
    border-radius: 30px;
    padding: 12px 18px 12px 40px;
    color: #e0d0ff;
    font-family: 'Nunito', sans-serif;
    font-size: 15px; font-weight: 600;
    outline: none; backdrop-filter: blur(12px);
  }
  .search-input::placeholder { color: rgba(200,168,255,0.55); }
  .filter-btn {
    width: 44px; height: 44px;
    background: rgba(20,10,45,0.88);
    border: 1.5px solid rgba(200,168,255,0.4);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; backdrop-filter: blur(12px); flex-shrink: 0;
  }

  /* ── TOGGLE ── */
  .location-toggle {
    position: absolute; top: 104px; right: 16px;
    z-index: 50;
    background: rgba(20,10,40,0.9);
    border: 1.5px solid var(--purple);
    border-radius: 20px; padding: 6px 14px;
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 800; color: #90EE90;
    backdrop-filter: blur(10px); cursor: pointer; user-select: none;
  }
  .toggle-dot {
    width: 8px; height: 8px; background: #90EE90;
    border-radius: 50%; animation: blink 1.5s infinite;
  }
  @keyframes blink {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:0.4; transform:scale(0.75); }
  }

  /* ── VENUE CARD ── */
  .venue-card {
    position: absolute; bottom: 92px; left: 16px;
    z-index: 50;
    background: rgba(22,8,50,0.94);
    border: 1.5px solid var(--purple);
    border-radius: 20px; padding: 12px 18px;
    backdrop-filter: blur(14px);
    box-shadow: 0 0 22px rgba(123,47,255,0.35);
    max-width: 220px;
    animation: slideUp 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }
  .venue-label {
    font-size: 10px; font-weight: 700;
    color: var(--purple-soft); letter-spacing: 1.5px; text-transform: uppercase;
  }
  .venue-label span { color: #fff; font-style: italic; font-weight: 900; }
  .venue-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px; letter-spacing: 1px; line-height: 1.05; margin-top: 2px;
    background: linear-gradient(90deg, #fff, #c8a8ff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  /* ── ACTION BTNS ── */
  .action-btns {
    position: absolute; bottom: 92px; right: 16px;
    z-index: 50;
    display: flex; flex-direction: column; gap: 10px; align-items: center;
  }
  .action-btn {
    width: 56px; height: 56px; border-radius: 50%; border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: transform 0.15s;
    box-shadow: 0 4px 18px rgba(0,0,0,0.45);
  }
  .action-btn:active { transform: scale(0.88); }
  .btn-v {
    background: var(--purple); color: white;
    font-family: 'Bebas Neue', sans-serif; font-size: 28px; position: relative;
  }
  .btn-v::after {
    content: '+'; position: absolute; top: 7px; right: 9px;
    font-size: 13px; font-weight: 900; font-family: 'Nunito', sans-serif;
  }
  .btn-send {
    width: 48px; height: 48px;
    background: rgba(123,47,255,0.55);
    border: 1.5px solid var(--purple) !important;
  }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 82px; background: var(--nav-bg);
    border-top: 1px solid rgba(123,47,255,0.35);
    display: flex; z-index: 60;
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 4px; cursor: pointer; transition: background 0.2s; position: relative;
  }
  .nav-item.active { background: var(--purple); }
  .nav-item.active::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 2px; background: var(--purple-soft);
  }
  .nav-item:not(.active):hover { background: rgba(123,47,255,0.18); }
  .nav-icon { font-size: 22px; }
  .nav-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px; color: #fff; letter-spacing: 1px;
  }
  .nav-divider {
    width: 1px; background: rgba(123,47,255,0.3);
    align-self: stretch; margin: 10px 0;
  }

  /* ── LOADING ── */
  #loading {
    position: absolute; inset: 0; background: #0d0d18;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 300; gap: 16px; transition: opacity 0.6s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  .loader-logo {
    font-family: 'Bebas Neue', sans-serif; font-size: 52px;
    background: linear-gradient(135deg, var(--purple), var(--purple-soft));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 3px;
  }
  .loader-sub {
    color: var(--purple-soft); font-size: 13px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase; opacity: 0.7;
  }
  .loader-spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(123,47,255,0.2);
    border-top-color: var(--purple); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── ERROR PANEL ── */
  #errorPanel {
    display: none;
    position: absolute; inset: 0;
    background: #0d0d18;
    flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 400; gap: 14px; padding: 32px; text-align: center;
  }
  #errorPanel.show { display: flex; }
  .err-icon { font-size: 48px; }
  .err-title {
    font-family: 'Bebas Neue', sans-serif; font-size: 28px;
    color: #ff6b6b; letter-spacing: 2px;
  }
  .err-msg {
    color: var(--purple-soft); font-size: 13px; font-weight: 600;
    line-height: 1.6; max-width: 300px;
  }
  .err-code {
    background: rgba(255,107,107,0.1);
    border: 1px solid rgba(255,107,107,0.3);
    border-radius: 10px; padding: 10px 16px;
    color: #ff9999; font-size: 12px; font-family: monospace;
    max-width: 320px; word-break: break-all;
  }
  .err-btn {
    background: var(--purple); color: white;
    border: none; border-radius: 20px;
    padding: 10px 24px; font-family: 'Nunito', sans-serif;
    font-size: 14px; font-weight: 800; cursor: pointer;
    margin-top: 4px;
  }

  /* ── TOAST ── */
  .toast {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(22,8,50,0.96);
    border: 1.5px solid var(--purple);
    border-radius: 16px; padding: 12px 20px;
    color: white; font-size: 14px; font-weight: 700;
    backdrop-filter: blur(12px); z-index: 100;
    text-align: center; pointer-events: none;
    opacity: 0; transition: opacity 0.3s; max-width: 260px;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="phone">
  <div class="notch"></div>

  <!-- LOADING -->
  <div id="loading">
    <div class="loader-logo">VYBING</div>
    <div class="loader-sub" id="loadingMsg">Loading map...</div>
    <div class="loader-spinner"></div>
  </div>

  <!-- ERROR PANEL -->
  <div id="errorPanel">
    <div class="err-icon">🗺️</div>
    <div class="err-title">Map Error</div>
    <div class="err-msg" id="errMsg">Something went wrong loading Google Maps.</div>
    <div class="err-code" id="errCode"></div>
    <button class="err-btn" onclick="location.reload()">Try Again</button>
  </div>

  <!-- MAP -->
  <div id="map"></div>

  <!-- UI OVERLAY -->
  <div class="search-bar">
    <div class="search-wrapper">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="searchInput" type="text" placeholder="Caută distracția...">
    </div>
    <div class="filter-btn">
      <svg width="18" height="14" viewBox="0 0 18 14" fill="none">
        <line x1="0" y1="2" x2="18" y2="2" stroke="#c8a8ff" stroke-width="2" stroke-linecap="round"/>
        <line x1="3" y1="7" x2="15" y2="7" stroke="#c8a8ff" stroke-width="2" stroke-linecap="round"/>
        <line x1="6" y1="12" x2="12" y2="12" stroke="#c8a8ff" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
  </div>

  <div class="location-toggle" id="locToggle">
    <div class="toggle-dot" id="toggleDot"></div>
    <svg width="13" height="13" viewBox="0 0 24 24" fill="#90EE90">
      <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
    </svg>
    <span id="toggleLabel">On</span>
  </div>

  <div class="venue-card">
    <div class="venue-label">YOU ARE <span>VYBING</span> AT...</div>
    <div class="venue-name" id="venueName">Locating...</div>
  </div>

  <div class="action-btns">
    <button class="action-btn btn-v" id="vybBtn">V</button>
    <button class="action-btn btn-send">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
        <path d="M2 12L22 2L14 22L11 13L2 12Z"/>
      </svg>
    </button>
  </div>

  <div class="toast" id="toast"></div>

  <div class="bottom-nav">
    <div class="nav-item active" onclick="setActive(this)">
      <span class="nav-icon">📍</span><span class="nav-label">MAP</span>
    </div>
    <div class="nav-divider"></div>
    <div class="nav-item" onclick="setActive(this)">
      <span class="nav-icon">🔭</span><span class="nav-label">DISCOVER</span>
    </div>
    <div class="nav-divider"></div>
    <div class="nav-item" onclick="setActive(this)">
      <span class="nav-icon">👥</span><span class="nav-label">VYBERZ</span>
    </div>
    <div class="nav-divider"></div>
    <div class="nav-item" onclick="setActive(this)">
      <span class="nav-icon">👤</span><span class="nav-label">PROFILE</span>
    </div>
  </div>
</div>

<script>
  // ── Catch Google Maps auth / load errors ──
  window.gm_authFailure = function() {
    showError(
      'API Key Error',
      'Your Google Maps API key is not authorized. Please check:',
      '1. Maps JavaScript API is enabled in Google Cloud Console\n2. Billing account is linked\n3. No referrer restrictions blocking this page'
    );
  };

  window.addEventListener('error', function(e) {
    if (e.message && e.message.includes('Google')) {
      showError('Script Error', e.message, e.filename + ':' + e.lineno);
    }
  });

  // Timeout fallback — if initMap never called after 10s
  const mapTimeout = setTimeout(() => {
    if (!window._mapLoaded) {
      showError(
        'Map Failed to Load',
        'Google Maps did not load. This could be due to:\n• No internet connection\n• API key not activated yet\n• Maps JavaScript API not enabled',
        'Tip: Go to console.cloud.google.com → APIs & Services → Library → enable "Maps JavaScript API"'
      );
    }
  }, 10000);

  function showError(title, msg, code) {
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('errMsg').textContent = msg;
    document.getElementById('errCode').textContent = code || '';
    document.querySelector('.err-title').textContent = title;
    document.getElementById('errorPanel').classList.add('show');
  }

  // ── Map styles ──
  const DARK_STYLE = [
    { elementType:"geometry", stylers:[{color:"#0d0d18"}] },
    { elementType:"labels.text.fill", stylers:[{color:"#2a2a55"}] },
    { elementType:"labels.text.stroke", stylers:[{color:"#0d0d18"}] },
    { featureType:"road", elementType:"geometry", stylers:[{color:"#1e1e38"}] },
    { featureType:"road", elementType:"geometry.stroke", stylers:[{color:"#12122a"}] },
    { featureType:"road", elementType:"labels.text.fill", stylers:[{color:"#3a3a70"}] },
    { featureType:"road.highway", elementType:"geometry", stylers:[{color:"#282850"}] },
    { featureType:"road.highway", elementType:"labels.text.fill", stylers:[{color:"#4a4a8a"}] },
    { featureType:"water", elementType:"geometry", stylers:[{color:"#060614"}] },
    { featureType:"poi", stylers:[{visibility:"off"}] },
    { featureType:"transit", stylers:[{visibility:"off"}] },
    { featureType:"landscape", elementType:"geometry", stylers:[{color:"#0d0d1e"}] },
    { featureType:"administrative", elementType:"geometry", stylers:[{color:"#1a1a38"}] },
    { featureType:"administrative.locality", elementType:"labels.text.fill", stylers:[{color:"#3a3a6a"}] },
  ];

  const SAMPLE_USERS = [
    { emoji:"🤙", count:null, color:"#5b1fbb", offset:{lat:0.004,  lng:0.003},  name:"Shaka Crew",  vibe:"Chilling at the rooftop" },
    { emoji:"💀", count:null, color:"#3a1a7a", offset:{lat:0.006,  lng:-0.004}, name:"Night Owls",  vibe:"Late night sessions" },
    { emoji:"🌿", count:22,   color:"#2a7a2a", offset:{lat:-0.003, lng:0.005},  name:"Green Vibes", vibe:"22 people vibing" },
    { emoji:"🔥", count:55,   color:"#8a3500", offset:{lat:0.002,  lng:0.007},  name:"Fire Squad",  vibe:"55 in the building 🔥" },
    { emoji:"🥂", count:89,   color:"#5a3010", offset:{lat:-0.005, lng:-0.002}, name:"Toast Gang",  vibe:"89 celebrating tonight" },
    { emoji:"💀", count:null, color:"#3a1a7a", offset:{lat:0.001,  lng:-0.007}, name:"Dark Ones",   vibe:"Secret gathering" },
    { emoji:"🤙", count:80,   color:"#5b1fbb", offset:{lat:-0.007, lng:0.006},  name:"Chill Spot",  vibe:"80 Vyberz here" },
    { emoji:"🔥", count:37,   color:"#cc4400", offset:{lat:-0.002, lng:-0.005}, name:"Hot Zone",    vibe:"37 and climbing!" },
  ];

  let map, geocoder, userMarker, locationOn = true, userPos = null;

  function makePinSVG(emoji, color, count) {
    const badge = count != null
      ? `<circle cx="38" cy="9" r="11" fill="#ff3a3a" stroke="#0d0d18" stroke-width="2"/>
         <text x="38" y="14" text-anchor="middle" font-family="Nunito,sans-serif" font-weight="900" font-size="11" fill="white">${count}</text>`
      : '';
    return 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(
      `<svg xmlns="http://www.w3.org/2000/svg" width="52" height="66" viewBox="0 0 52 66">
        <defs><filter id="s"><feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="rgba(0,0,0,0.55)"/></filter></defs>
        <path d="M26 1C12 1 1 12 1 26c0 18 25 39 25 39s25-21 25-39C51 12 40 1 26 1Z"
              fill="${color}" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" filter="url(#s)"/>
        <text x="26" y="32" text-anchor="middle" font-size="22" dominant-baseline="middle">${emoji}</text>
        ${badge}
      </svg>`
    );
  }

  function showToast(msg, dur = 2500) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), dur);
  }

  function getVenueName(lat, lng) {
    if (!geocoder) return;
    geocoder.geocode({ location: { lat, lng } }, (results, status) => {
      const name = (status === 'OK' && results.length)
        ? (results[0].address_components.find(c =>
            c.types.includes('establishment') || c.types.includes('point_of_interest')
          )?.long_name || results[0].address_components[0]?.long_name || 'Your Area')
        : 'Your Location';
      document.getElementById('venueName').textContent = name;
    });
  }

  function placeMarkers(lat, lng) {
    const userSVG = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28">
      <circle cx="14" cy="14" r="12" fill="rgba(123,47,255,0.22)"/>
      <circle cx="14" cy="14" r="7" fill="#7B2FFF" stroke="white" stroke-width="2.5"/>
    </svg>`;

    if (userMarker) userMarker.setMap(null);
    userMarker = new google.maps.Marker({
      position: { lat, lng }, map,
      icon: {
        url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(userSVG),
        scaledSize: new google.maps.Size(28, 28),
        anchor: new google.maps.Point(14, 14),
      },
      title: 'You', zIndex: 999,
    });

    SAMPLE_USERS.forEach(u => {
      const marker = new google.maps.Marker({
        position: { lat: lat + u.offset.lat, lng: lng + u.offset.lng },
        map,
        icon: {
          url: makePinSVG(u.emoji, u.color, u.count),
          scaledSize: new google.maps.Size(48, 58),
          anchor: new google.maps.Point(24, 58),
        },
        title: u.name,
      });
      marker.addListener('click', () => showToast(`${u.emoji} ${u.name} — ${u.vibe}`));
    });

    getVenueName(lat, lng);
  }

  window.initMap = function () {
    window._mapLoaded = true;
    clearTimeout(mapTimeout);

    try {
      geocoder = new google.maps.Geocoder();
      const defaultCenter = { lat: -1.2921, lng: 36.8219 };

      map = new google.maps.Map(document.getElementById('map'), {
        center: defaultCenter, zoom: 15,
        styles: DARK_STYLE,
        disableDefaultUI: true,
        gestureHandling: 'greedy',
        clickableIcons: false,
      });

      document.getElementById('loadingMsg').textContent = 'Finding your location...';

      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          pos => {
            userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            map.setCenter(userPos);
            placeMarkers(userPos.lat, userPos.lng);
            hideLoading();
          },
          () => {
            userPos = defaultCenter;
            placeMarkers(userPos.lat, userPos.lng);
            hideLoading();
            showToast('📍 Showing Nairobi — allow location for your area');
          },
          { enableHighAccuracy: true, timeout: 8000 }
        );
      } else {
        userPos = defaultCenter;
        placeMarkers(userPos.lat, userPos.lng);
        hideLoading();
      }

      document.getElementById('vybBtn').addEventListener('click', () => {
        if (userPos) { map.panTo(userPos); map.setZoom(15); showToast('📍 Centered on you'); }
      });

      document.getElementById('locToggle').addEventListener('click', () => {
        locationOn = !locationOn;
        const dot = document.getElementById('toggleDot');
        const lbl = document.getElementById('toggleLabel');
        dot.style.background = locationOn ? '#90EE90' : '#888';
        dot.style.animation = locationOn ? 'blink 1.5s infinite' : 'none';
        lbl.textContent = locationOn ? 'On' : 'Off';
        lbl.style.color = locationOn ? '#90EE90' : '#888';
        showToast(locationOn ? '📍 Location sharing ON' : '🚫 Location sharing OFF');
        if (locationOn && userPos) map.panTo(userPos);
      });

    } catch(err) {
      showError('Map Init Error', err.message, err.stack);
    }
  };

  function hideLoading() {
    setTimeout(() => document.getElementById('loading').classList.add('hidden'), 700);
  }

  function setActive(el) {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
  }
</script>

<script
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBtY48sfGK5Fvnh7ysIciqmRos_-qC9XkU&callback=initMap&loading=async"
  onerror="showError('Failed to Load Maps Script', 'Could not reach Google Maps servers. Check your internet connection.', 'maps.googleapis.com unreachable')"
  async defer>
</script>

</body>
</html>
